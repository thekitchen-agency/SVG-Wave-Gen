<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaveGen - Premium SVG Wave Generator</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="app-container">
    <aside class="sidebar glass-panel">
      <div class="sidebar-header">
        <div class="sidebar-title">
          <h1>WaveGen</h1>
          <p>Premium SVG Waves</p>
        </div>
        <button id="btn-randomize" class="btn secondary" title="Generate new random shapes">⟳ Shuffle</button>
      </div>

      <div class="controls-group">
        <label>
          <span>Waves Count</span>
          <span id="waves-count-val" class="val">3</span>
        </label>
        <input type="range" id="waves-count" min="1" max="10" value="3">
        
        <label>
          <span>Points</span>
          <span id="complexity-val" class="val">5</span>
        </label>
        <input type="range" id="complexity" min="2" max="20" value="5">

        <label>
          <span>Variability</span>
          <span id="variability-val" class="val">50%</span>
        </label>
        <input type="range" id="variability" min="0" max="100" value="50">

        <label>
          <span>Amplitude</span>
          <span id="amplitude-val" class="val">80px</span>
        </label>
        <input type="range" id="amplitude" min="10" max="300" value="80">
      </div>

      <div class="controls-group">
        <div class="color-picker-row">
          <label>Top Color</label>
          <input type="color" id="color-top" value="#4facfe">
        </div>
        <div class="color-picker-row">
          <label>Bottom Color</label>
          <input type="color" id="color-bottom" value="#00f2fe">
        </div>
        <div class="checkbox-row mt-sm">
          <label for="use-gradient">Use Gradient</label>
          <input type="checkbox" id="use-gradient" checked>
        </div>
        <div class="checkbox-row mt-sm">
          <label for="solid-fill">Solid Fill</label>
          <input type="checkbox" id="solid-fill" checked>
        </div>
        <div class="checkbox-row mt-sm">
          <label for="pos-top">Flip Vertically (Top)</label>
          <input type="checkbox" id="pos-top">
        </div>
      </div>

      <div class="controls-group">
        <label>Animation Behavior</label>
        <div class="checkbox-row mt-sm">
          <label for="anim-translate">Translate Motion <i class="info-icon" data-tooltip="Slides the wave continuously horizontally.">i</i></label>
          <input type="checkbox" id="anim-translate" checked>
        </div>
        <div class="checkbox-row mt-sm">
          <label for="anim-deform">Deform Shape <i class="info-icon" data-tooltip="Morphs the wave's path dynamically to simulate churning liquid.">i</i></label>
          <input type="checkbox" id="anim-deform" checked>
        </div>
        <label class="mt-sm">
          <span>Deform Speed <i class="info-icon" data-tooltip="How fast the wave shape morphs and churns.">i</i></span>
          <span id="deform-speed-val" class="val">10s</span>
        </label>
        <input type="range" id="deform-speed" min="2" max="30" value="10">
        
        <label class="mt-sm">
          <span>Deform Intensity <i class="info-icon" data-tooltip="How violently the wave peaks shift during the morphing.">i</i></span>
          <span id="deform-intensity-val" class="val">40%</span>
        </label>
        <input type="range" id="deform-intensity" min="0" max="100" value="40">
        
        <label class="mt-sm">
          <span>Deform Keyframes <i class="info-icon" data-tooltip="Number of distinct shape phases. More keyframes = chaotic boiling.">i</i></span>
          <span id="deform-keyframes-val" class="val">3</span>
        </label>
        <input type="range" id="deform-keyframes" min="2" max="10" value="3">
        
        <div class="checkbox-row mt-sm">
          <label for="deform-desync">Desync Layers <i class="info-icon" data-tooltip="Randomizes deform speeds heavily to make layers fall organically out of sync.">i</i></label>
          <input type="checkbox" id="deform-desync" checked>
        </div>

        <div class="checkbox-row mt-sm">
           <label>Direction <i class="info-icon" data-tooltip="The direction of the horizontal slide.">i</i></label>
           <select id="move-direction">
             <option value="left" selected>Left</option>
             <option value="right">Right</option>
           </select>
        </div>
        <label class="mt-md">
          <span>Translate Speed <i class="info-icon" data-tooltip="How fast the wave slides laterally across the container.">i</i></span>
          <span id="speed-val" class="val">10s</span>
        </label>
        <input type="range" id="speed" min="2" max="30" value="10">
      </div>

      <div class="export-actions">
        <button id="btn-copy-html" class="btn primary">Copy HTML</button>
        <button id="btn-copy-css" class="btn secondary">Copy CSS</button>
      </div>
      
      <div id="toast" class="toast">Copied to clipboard!</div>
    </aside>

    <section class="preview-area">
      <div class="preview-card glass-panel">
        <div id="wave-container" class="wave-container">
          <!-- Live Preview -->
        </div>
        <div class="export-preview">
            <h3>Export Code</h3>
            <div class="tabs">
              <button class="tab active" data-target="html-code">HTML</button>
              <button class="tab" data-target="css-code">CSS</button>
            </div>
            <pre id="html-code" class="code-block active"><code></code></pre>
            <pre id="css-code" class="code-block"><code></code></pre>
        </div>
      </div>
    </section>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
